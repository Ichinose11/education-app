<div class="min-h-screen flex items-center justify-center bg-slate-950 px-4 py-12 relative overflow-hidden">
  <!-- Decorative Background Glows -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md bg-slate-900/40 backdrop-blur-xl border border-slate-800 rounded-2xl shadow-2xl p-8 relative z-10">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
        Welcome Back
      </h2>
      <p class="mt-2 text-sm text-slate-400">
        Sign in to access your dashboard
      </p>
    </div>

    <!-- Error Alert -->
    <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg flex items-start space-x-2">
      <svg class="h-5 w-5 text-red-400 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Username field -->
      <div>
        <label for="username" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">
          Username
        </label>
        <div class="relative">
          <input
            id="username"
            type="text"
            formControlName="username"
            class="w-full bg-slate-950/40 border border-slate-800 text-slate-100 placeholder-slate-600 rounded-lg px-4 py-3 text-sm focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none transition-all"
            [class.border-red-500]="loginForm.get('username')?.touched && loginForm.get('username')?.invalid"
            placeholder="Enter your username"
          />
        </div>
        <!-- Username validations -->
        <div *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.invalid" class="mt-1 text-xs text-red-400">
          <span *ngIf="loginForm.get('username')?.errors?.['required']">Username is required.</span>
        </div>
      </div>

      <!-- Password field -->
      <div>
        <label for="password" class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">
          Password
        </label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full bg-slate-950/40 border border-slate-800 text-slate-100 placeholder-slate-600 rounded-lg px-4 py-3 text-sm focus:border-sky-500 focus:ring-1 focus:ring-sky-500 outline-none transition-all"
          [class.border-red-500]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
          placeholder="••••••••"
        />
        <!-- Password validations -->
        <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="mt-1 text-xs text-red-400">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <!-- Submit button -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 text-white font-medium py-3 rounded-lg text-sm shadow-lg hover:shadow-sky-500/15 transition-all duration-200 active:scale-[0.98] disabled:opacity-50 disabled:pointer-events-none flex justify-center items-center space-x-2"
      >
        <svg *ngIf="isLoading" class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ isLoading ? 'Signing in...' : 'Sign In' }}</span>
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-xs text-slate-400">
        Don't have an account?
        <a routerLink="/register" class="text-sky-400 hover:text-sky-300 font-semibold transition-colors">
          Create one now
        </a>
      </p>
    </div>
  </div>
</div>
